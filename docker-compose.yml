services:
  agents-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ~/.claude:/root/.claude
    environment:
      - CLAUDE_DIR=/root/.claude
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
